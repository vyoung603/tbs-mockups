<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Reflection</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #F5F0E8;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: system-ui, -apple-system, sans-serif;
  }

  /* Device Frame */
  .device {
    width: 402px;
    height: 874px;
    background: #1a1a1a;
    border-radius: 48px;
    padding: 8px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.05) inset;
    position: relative;
  }

  .screen {
    width: 100%;
    height: 100%;
    background: #ffffff;
    border-radius: 40px;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
  }

  .status-bar {
    height: 54px;
    padding: 14px 24px 0;
    flex-shrink: 0;
    background: #ffffff;
  }

  .dynamic-island {
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    width: 126px;
    height: 36px;
    background: #1a1a1a;
    border-radius: 20px;
    z-index: 10;
  }

  /* Header Bar */
  .header-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 20px 12px;
    flex-shrink: 0;
    background: #ffffff;
  }

  .close-btn {
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border-radius: 50%;
    background: rgba(0,0,0,0.05);
  }

  .close-btn svg {
    width: 18px;
    height: 18px;
    stroke: #666;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .header-title {
    font-size: 17px;
    font-weight: 600;
    color: #1a1a1a;
    letter-spacing: -0.2px;
  }

  .save-btn {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, #46b2b8 0%, #3a9da3 100%);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }

  .save-btn svg {
    width: 18px;
    height: 18px;
    stroke: #ffffff;
    fill: none;
    stroke-width: 2.2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  /* Main content area with warm gradient background */
  .content {
    flex: 1;
    overflow-y: auto;
    padding: 0 28px 40px;
    -webkit-overflow-scrolling: touch;
    display: flex;
    flex-direction: column;
    position: relative;
    background: linear-gradient(170deg, #ffffff 0%, #faf8f2 20%, #f2efe6 45%, #eef0e8 70%, #e8ede8 100%);
  }

  .content::-webkit-scrollbar { display: none; }

  /* Warm orbs matching Figma gradient treatment */
  .content::before {
    content: '';
    position: absolute;
    bottom: 20px;
    left: -60px;
    width: 280px;
    height: 280px;
    background: radial-gradient(circle, rgba(241,215,125,0.25) 0%, rgba(241,215,125,0.08) 40%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
  }

  .content::after {
    content: '';
    position: absolute;
    bottom: 0;
    right: -40px;
    width: 220px;
    height: 220px;
    background: radial-gradient(circle, rgba(163,184,107,0.18) 0%, rgba(163,184,107,0.05) 40%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
  }

  /* Feeling Question */
  .feeling-question {
    font-family: system-ui, -apple-system, sans-serif;
    font-size: 26px;
    font-weight: 600;
    color: #004455;
    text-align: center;
    margin-top: 36px;
    margin-bottom: 36px;
    line-height: 1.25;
    letter-spacing: -0.3px;
    position: relative;
    z-index: 1;
  }

  /* Slider Section */
  .slider-section {
    margin-bottom: 44px;
    position: relative;
    z-index: 1;
  }

  .slider-track-wrapper {
    position: relative;
    height: 40px;
    display: flex;
    align-items: center;
    margin-bottom: 10px;
  }

  .slider-track {
    width: 100%;
    height: 6px;
    border-radius: 3px;
    background: linear-gradient(to right, #c9a882 0%, #d4c4aa 25%, #b8c8c4 50%, #7ec4c8 75%, #46b2b8 100%);
    position: relative;
  }

  .slider-ticks {
    position: absolute;
    top: 50%;
    left: 0;
    right: 0;
    transform: translateY(-50%);
    display: flex;
    justify-content: space-between;
    padding: 0 1px;
  }

  .slider-tick {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: rgba(255,255,255,0.5);
  }

  .slider-thumb {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 24px;
    height: 24px;
    background: #c0c0c0;
    border-radius: 50%;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15), 0 0 0 3px rgba(0,0,0,0.04);
    cursor: pointer;
  }

  .slider-labels-row {
    position: relative;
    display: flex;
    justify-content: space-between;
  }

  .slider-label {
    font-size: 10px;
    color: #999;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .slider-label.center {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
  }

  /* Thoughts Card */
  .thoughts-card {
    background: #ffffff;
    border-radius: 18px;
    padding: 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.04), 0 0 0 1px rgba(0,0,0,0.03);
    position: relative;
    z-index: 1;
  }

  .section-label {
    font-size: 15px;
    font-weight: 600;
    color: #1a1a1a;
    margin-bottom: 12px;
    letter-spacing: -0.1px;
  }

  .thoughts-textarea {
    width: 100%;
    height: 120px;
    border: none;
    border-radius: 0;
    padding: 0;
    font-family: system-ui, -apple-system, sans-serif;
    font-size: 15px;
    color: #1a1a1a;
    line-height: 1.5;
    resize: none;
    outline: none;
    background: transparent;
  }

  .thoughts-textarea::placeholder {
    color: #bbb;
    font-weight: 400;
  }

  /* Spacer */
  .spacer {
    flex: 1;
    min-height: 32px;
  }

  /* Help Reflect Button -- pill outline style */
  .reflect-btn {
    align-self: center;
    padding: 12px 28px;
    background: #ffffff;
    border: 1.5px solid #e0e0e0;
    border-radius: 28px;
    color: #1a1a1a;
    font-family: system-ui, -apple-system, sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: -0.1px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    margin-bottom: 20px;
    flex-shrink: 0;
    position: relative;
    z-index: 1;
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  }

  .reflect-btn .sparkle {
    font-size: 14px;
    color: #004455;
  }

  @media all {
    body.in-iframe { background: transparent !important; }
    body.in-iframe .device { box-shadow: none !important; }
  }
</style>
</head>
<body>

<div class="device">
  <div class="screen">
    <div class="dynamic-island"></div>

    <!-- Status Bar -->
    <div class="status-bar">
      <img src="status-bar.png" alt="" style="width:100%;height:auto;display:block;">
    </div>

    <!-- Header Bar -->
    <div class="header-bar">
      <div class="close-btn">
        <svg viewBox="0 0 24 24">
          <line x1="8" y1="8" x2="16" y2="16"/>
          <line x1="16" y1="8" x2="8" y2="16"/>
        </svg>
      </div>
      <span class="header-title">Daily Reflection</span>
      <div class="save-btn">
        <svg viewBox="0 0 24 24"><polyline points="6 12 10 16 18 8"/></svg>
      </div>
    </div>

    <!-- Content -->
    <div class="content">

      <!-- Feeling Question -->
      <div class="feeling-question">How are you feeling?</div>

      <!-- Feeling Slider -->
      <div class="slider-section">
        <div class="slider-track-wrapper">
          <div class="slider-track">
            <div class="slider-ticks">
              <div class="slider-tick"></div>
              <div class="slider-tick"></div>
              <div class="slider-tick"></div>
              <div class="slider-tick"></div>
              <div class="slider-tick"></div>
            </div>
          </div>
          <div class="slider-thumb"></div>
        </div>
        <div class="slider-labels-row">
          <span class="slider-label">Very Unpleasant</span>
          <span class="slider-label center">Neutral</span>
          <span class="slider-label">Very Pleasant</span>
        </div>
      </div>

      <!-- Thoughts Card -->
      <div class="thoughts-card">
        <div class="section-label">Write down your thoughts</div>
        <textarea class="thoughts-textarea" placeholder="Start writing.."></textarea>
      </div>

      <!-- Spacer -->
      <div class="spacer"></div>

      <!-- Help Me Reflect Button -->
      <button class="reflect-btn">
        <span class="sparkle">&#10022;</span>
        Help me reflect
      </button>

    </div>

  </div>
</div>

<script>if (window !== window.top) document.body.classList.add('in-iframe');</script>
</body>
</html>
